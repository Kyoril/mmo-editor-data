# This workflow has been disabled. The mmo_data Docker image is now built and
# published from the main repository (Dockerfile.data) so that it can include
# both the server data and the data/client/Worlds folder in a single image.
name: Publish Docker Images (disabled)

on:
  workflow_dispatch:

jobs:
  push_to_registry:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    environment: DockerHub

    steps:
    - name: Check out the repo
      uses: actions/checkout@v3
      with:
        submodules: 'recursive'

    - name: Login to DockerHub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push data image
      uses: docker/build-push-action@v2
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/mmo_data:latest
